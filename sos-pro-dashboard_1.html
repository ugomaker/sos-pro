<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOS Urgence Pro — Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --red: #CC1A1A;
    --text: #0D0D0D;
    --muted: #888;
    --bg: #F5F5F5;
    --border: #e5e5e5;
    --green: #1C8C4B;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 20px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  .login-box, .card {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,.06);
    margin-bottom: 20px;
  }
  .login-box { max-width: 380px; margin: 60px auto; }
  .title {
    font-family: 'Oswald', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--red);
    letter-spacing: .04em;
    text-align: center;
    margin-bottom: 2px;
  }
  .subtitle { font-size: .85rem; color: var(--muted); text-align: center; margin-bottom: 24px; }
  .section-title {
    font-family: 'Oswald', sans-serif;
    font-size: .9rem;
    font-weight: 700;
    letter-spacing: .04em;
    color: var(--text);
    margin-bottom: 14px;
  }
  label { display: block; font-size: .8rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  input, select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 1rem;
    margin-bottom: 14px;
    font-family: 'Nunito', sans-serif;
    background: #fff;
  }
  input:focus, select:focus { outline: none; border-color: var(--red); }
  button {
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: .95rem;
    letter-spacing: .04em;
    cursor: pointer;
    width: 100%;
  }
  button:disabled { opacity: .6; cursor: default; }
  .error { color: var(--red); font-size: .85rem; margin-top: 10px; text-align: center; min-height: 1.2em; }
  .success { color: var(--green); font-size: .85rem; margin-top: 10px; text-align: center; min-height: 1.2em; }
  #app { display: none; }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .topbar .who { font-size: .85rem; color: var(--muted); }
  .logout-link { width: auto; background: none; color: var(--muted); text-decoration: underline; font-size: .8rem; padding: 0; }
  .client-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--border);
  }
  .client-row:last-child { border-bottom: none; }
  .client-nom { font-weight: 700; font-size: .95rem; color: var(--text); }
  .client-meta { font-size: .78rem; color: var(--muted); margin-top: 2px; }
  .client-count { font-family: 'Oswald', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--red); text-align: right; }
  .client-count span { display: block; font-size: .65rem; color: var(--muted); font-family: 'Nunito', sans-serif; font-weight: 700; letter-spacing: .03em; }
  .empty { font-size: .85rem; color: var(--muted); text-align: center; padding: 10px 0; }
  .badge { display: inline-block; font-size: .68rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-left: 6px; letter-spacing: .03em; }
  .badge-entreprise { background: #eef2ff; color: #3b3bd6; }
  .badge-mairie { background: #fff4e5; color: #b85c00; }
  .stat-row { display: flex; gap: 12px; }
  .stat-box { flex: 1; text-align: center; background: var(--bg); border-radius: 10px; padding: 14px 8px; }
  .stat-num { font-family: 'Oswald', sans-serif; font-size: 1.6rem; font-weight: 700; }
  .stat-label { font-size: .68rem; color: var(--muted); font-weight: 700; letter-spacing: .03em; text-transform: uppercase; margin-top: 2px; }
  .act-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: .85rem; }
  .act-row:last-child { border-bottom: none; }
  .act-initiales { font-weight: 700; color: var(--text); font-family: 'Oswald', sans-serif; letter-spacing: .05em; }
  .act-date { color: var(--muted); font-size: .78rem; }
</style>
</head>
<body>

<div class="wrap">

  <div class="login-box" id="login-view">
    <div class="title">SOS URGENCE</div>
    <div class="subtitle">Espace Pro — Administration</div>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="vous@exemple.com" autocomplete="email">

    <label for="password">Mot de passe</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">

    <button id="login-btn" onclick="seConnecter()">Se connecter</button>
    <div id="login-error" class="error"></div>
  </div>

  <div id="app">

    <div class="card topbar">
      <div class="who">Connecté : <strong id="welcome-email"></strong></div>
      <button class="logout-link" onclick="seDeconnecter()">Se déconnecter</button>
    </div>

    <div id="admin-view" style="display:none;">
      <div class="card">
        <div class="section-title">Créer un nouveau code</div>
        <label for="new-nom">Nom de la structure</label>
        <input id="new-nom" type="text" placeholder="Ex : Maki People">
        <label for="new-type">Type</label>
        <select id="new-type">
          <option value="entreprise">Entreprise</option>
          <option value="mairie">Mairie</option>
        </select>
        <label for="new-code">Code d'activation</label>
        <input id="new-code" type="text" placeholder="Ex : MAKI2026">
        <label for="new-email">Email de l'employeur (accès à son dashboard)</label>
        <input id="new-email" type="email" placeholder="contact@entreprise.com">
        <button id="create-btn" onclick="creerCode()">Créer le code</button>
        <div id="create-error" class="error"></div>
        <div id="create-success" class="success"></div>
      </div>

      <div class="card">
        <div class="section-title">Clients</div>
        <div id="clients-list"><div class="empty">Chargement...</div></div>
      </div>
    </div>

    <div id="employer-view" style="display:none;">
      <div class="card">
        <div class="section-title" id="employer-nom">—</div>
        <div class="client-meta" id="employer-code" style="margin-bottom:16px;"></div>
        <div class="stat-row">
          <div class="stat-box">
            <div class="stat-num" style="color:var(--red);" id="employer-count-uniques">0</div>
            <div class="stat-label">Employés</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" style="color:var(--text);" id="employer-count-total">0</div>
            <div class="stat-label">Activations</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Détail des activations</div>
        <div id="employer-activations-list"><div class="empty">Chargement...</div></div>
      </div>
    </div>

  </div>

</div>

<script>
  var SUPABASE_URL = 'https://tkeummevgbmfhavvkwsx.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_UfxUmV7bkzS4MJiojli5LQ_XEMe7-jd';
  var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function showDashboard(email) {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('welcome-email').textContent = email;

    client.from('entreprises').select('*').eq('email', email).maybeSingle()
      .then(function(res) {
        if (res.data) {
          document.getElementById('admin-view').style.display = 'none';
          document.getElementById('employer-view').style.display = 'block';
          chargerStatsEmployeur(res.data);
        } else {
          document.getElementById('employer-view').style.display = 'none';
          document.getElementById('admin-view').style.display = 'block';
          chargerClients();
        }
      })
      .catch(function() {
        document.getElementById('employer-view').style.display = 'none';
        document.getElementById('admin-view').style.display = 'block';
        chargerClients();
      });
  }

  function showLogin() {
    document.getElementById('login-view').style.display = 'block';
    document.getElementById('app').style.display = 'none';
  }

  function seConnecter() {
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var errorEl = document.getElementById('login-error');
    var btn = document.getElementById('login-btn');
    errorEl.textContent = '';
    if (!email || !password) { errorEl.textContent = 'Merci de remplir les deux champs.'; return; }
    btn.disabled = true; btn.textContent = 'Connexion...';
    client.auth.signInWithPassword({ email: email, password: password })
      .then(function(res) {
        btn.disabled = false; btn.textContent = 'Se connecter';
        if (res.error) { errorEl.textContent = 'Email ou mot de passe incorrect.'; return; }
        showDashboard(res.data.user.email);
      })
      .catch(function() {
        btn.disabled = false; btn.textContent = 'Se connecter';
        errorEl.textContent = 'Erreur réseau, réessayez.';
      });
  }

  function seDeconnecter() {
    client.auth.signOut().then(function() { showLogin(); });
  }

  function creerCode() {
    var nom = document.getElementById('new-nom').value.trim();
    var type = document.getElementById('new-type').value;
    var code = document.getElementById('new-code').value.trim().toUpperCase();
    var email = document.getElementById('new-email').value.trim();
    var errorEl = document.getElementById('create-error');
    var successEl = document.getElementById('create-success');
    var btn = document.getElementById('create-btn');
    errorEl.textContent = ''; successEl.textContent = '';

    if (!nom || !code) { errorEl.textContent = 'Merci de remplir tous les champs.'; return; }

    btn.disabled = true; btn.textContent = 'Création...';
    client.from('entreprises').insert({ nom: nom, type: type, code: code, email: email || null })
      .then(function(res) {
        btn.disabled = false; btn.textContent = 'Créer le code';
        if (res.error) {
          errorEl.textContent = res.error.message.indexOf('duplicate') > -1 ? 'Ce code existe déjà.' : 'Erreur lors de la création.';
          return;
        }
        successEl.textContent = 'Code "' + code + '" créé !';
        document.getElementById('new-nom').value = '';
        document.getElementById('new-code').value = '';
        document.getElementById('new-email').value = '';
        chargerClients();
      })
      .catch(function() {
        btn.disabled = false; btn.textContent = 'Créer le code';
        errorEl.textContent = 'Erreur réseau, réessayez.';
      });
  }

  function chargerStatsEmployeur(entreprise) {
    document.getElementById('employer-nom').textContent = entreprise.nom;
    document.getElementById('employer-code').textContent = 'Code : ' + entreprise.code;
    var listEl = document.getElementById('employer-activations-list');
    listEl.innerHTML = '<div class="empty">Chargement...</div>';

    client.from('activations').select('initiales, created_at').eq('code', entreprise.code).order('created_at', { ascending: false })
      .then(function(res) {
        var rows = res.data || [];
        var uniques = {};
        rows.forEach(function(r) { if (r.initiales) uniques[r.initiales] = true; });
        document.getElementById('employer-count-uniques').textContent = Object.keys(uniques).length;
        document.getElementById('employer-count-total').textContent = rows.length;

        if (rows.length === 0) {
          listEl.innerHTML = '<div class="empty">Aucune activation pour le moment.</div>';
          return;
        }
        listEl.innerHTML = rows.map(function(r) {
          var dateStr = '';
          if (r.created_at) {
            var d = new Date(r.created_at);
            dateStr = d.toLocaleDateString('fr-FR') + ' à ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
          }
          return '<div class="act-row">' +
            '<div class="act-initiales">' + (r.initiales || '—') + '</div>' +
            '<div class="act-date">' + dateStr + '</div>' +
            '</div>';
        }).join('');
      })
      .catch(function() {
        listEl.innerHTML = '<div class="empty">Erreur réseau.</div>';
      });
  }

  function chargerClients() {
    var listEl = document.getElementById('clients-list');
    listEl.innerHTML = '<div class="empty">Chargement...</div>';

    client.from('entreprises').select('*').order('created_at', { ascending: false })
      .then(function(entRes) {
        if (entRes.error || !entRes.data || entRes.data.length === 0) {
          listEl.innerHTML = '<div class="empty">Aucun client pour le moment.</div>';
          return;
        }
        var entreprises = entRes.data;

        client.from('activations').select('code')
          .then(function(actRes) {
            var counts = {};
            (actRes.data || []).forEach(function(a) {
              counts[a.code] = (counts[a.code] || 0) + 1;
            });

            listEl.innerHTML = entreprises.map(function(e) {
              var count = counts[e.code] || 0;
              var badgeClass = e.type === 'mairie' ? 'badge-mairie' : 'badge-entreprise';
              var badgeLabel = e.type === 'mairie' ? 'Mairie' : 'Entreprise';
              return '<div class="client-row">' +
                '<div>' +
                  '<div class="client-nom">' + e.nom + '<span class="badge ' + badgeClass + '">' + badgeLabel + '</span></div>' +
                  '<div class="client-meta">Code : ' + e.code + (e.email ? ' · ' + e.email : '') + '</div>' +
                '</div>' +
                '<div class="client-count">' + count + '<span>activation' + (count === 1 ? '' : 's') + '</span></div>' +
              '</div>';
            }).join('');
          });
      });
  }

  client.auth.getSession().then(function(res) {
    if (res.data.session) { showDashboard(res.data.session.user.email); }
  });
</script>

</body>
</html>
